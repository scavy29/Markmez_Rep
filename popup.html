<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="popup">
    <h2>Save this tab to a board</h2>
    <div class="current-tab" id="currentTab">
      <img id="ctIcon" src="" alt="" />
      <div class="info">
        <div id="ctTitle">Loading…</div>
        <div id="ctUrl"></div>
      </div>
    </div>
    <select id="boardSelect"></select>
    <button class="btn btn-primary" id="saveBtn">Save to board</button>
    <div class="status" id="status"></div>
  </div>
  <script src="js/store.js"></script>
  <script src="js/popup.js"></script>
</body>
</html>
